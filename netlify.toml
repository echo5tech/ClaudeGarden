# Netlify configuration — WeGarden (Next.js 16, pnpm monorepo)
[build]
  # Run everything from the web app directory; install from monorepo root first
  # so pnpm workspace packages (@garden/shared, @garden/database) resolve.
  base    = "apps/web"
  command = "cd ../.. && pnpm install --frozen-lockfile && cd apps/web && pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION            = "22"
  PNPM_VERSION            = "9"
  NEXT_TELEMETRY_DISABLED = "1"
  # NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
  # must be set in Netlify UI → Site configuration → Environment variables.
  # They need the "Builds" scope so Next.js can inline them at build time.

# Netlify's Next.js runtime — handles SSR, Server Actions, and Route Handlers.
[[plugins]]
  package = "@netlify/plugin-nextjs"
